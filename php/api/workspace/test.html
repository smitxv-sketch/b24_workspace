<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace API — тест эндпоинтов</title>
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: rgba(255,255,255,.07);
    --text: #e8e8f0;
    --muted: #6e6e80;
    --accent: #6c6eff;
    --green: #34d399;
    --red: #f87171;
    --amber: #fbbf24;
    --font: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    --sans: -apple-system, 'Helvetica Neue', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  /* Header */
  .header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-size: 15px; font-weight: 600; letter-spacing: -.02em; }
  .header-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .status-pill { font-size: 10px; padding: 3px 10px; border-radius: 20px; background: rgba(108,110,255,.15); color: var(--accent); border: 1px solid rgba(108,110,255,.25); }

  /* Layout */
  .layout { display: grid; grid-template-columns: 260px 1fr; height: calc(100vh - 61px); }
  .sidebar { border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 0; }
  .main { overflow-y: auto; }

  /* Sidebar endpoints */
  .sb-group { padding: 4px 12px 2px; font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-top: 8px; }
  .endpoint-btn { width: 100%; text-align: left; background: none; border: none; color: var(--muted); font-family: var(--sans); font-size: 12px; padding: 7px 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; border-radius: 0; }
  .endpoint-btn:hover { background: var(--surface); color: var(--text); }
  .endpoint-btn.active { background: rgba(108,110,255,.12); color: var(--accent); }
  .ep-method { font-size: 9px; font-family: var(--font); font-weight: 700; padding: 2px 5px; border-radius: 4px; flex-shrink: 0; }
  .get { background: rgba(52,211,153,.12); color: var(--green); }
  .ep-name { letter-spacing: -.01em; }

  /* Params panel */
  .params-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .param-group { display: flex; flex-direction: column; gap: 4px; }
  .param-label { font-size: 10px; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; }
  .param-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: var(--font); font-size: 12px; padding: 6px 10px; border-radius: 6px; width: 180px; outline: none; }
  .param-input:focus { border-color: var(--accent); }
  .run-btn { background: var(--accent); color: #fff; border: none; font-family: var(--sans); font-size: 12px; font-weight: 600; padding: 7px 18px; border-radius: 6px; cursor: pointer; letter-spacing: -.01em; flex-shrink: 0; }
  .run-btn:hover { background: #5a5cf0; }
  .run-btn:active { transform: scale(.97); }

  /* Response */
  .response-area { padding: 20px; }
  .response-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .status-badge { font-size: 11px; font-family: var(--font); padding: 3px 8px; border-radius: 5px; }
  .ok { background: rgba(52,211,153,.12); color: var(--green); }
  .err { background: rgba(248,113,113,.12); color: var(--red); }
  .meta-time { font-size: 11px; color: var(--muted); font-family: var(--font); }
  .meta-url { font-size: 11px; color: var(--muted); font-family: var(--font); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 400px; }

  /* JSON viewer */
  .json-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .json-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; border-bottom: 1px solid var(--border); }
  .json-label { font-size: 11px; color: var(--muted); font-family: var(--font); }
  .copy-btn { font-size: 10px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 3px 8px; border-radius: 4px; cursor: pointer; }
  .copy-btn:hover { color: var(--text); }
  pre#json-out { font-family: var(--font); font-size: 12px; line-height: 1.6; padding: 16px; overflow-x: auto; max-height: calc(100vh - 280px); white-space: pre-wrap; word-break: break-word; }

  /* Colors in JSON */
  .j-key   { color: #93c5fd; }
  .j-str   { color: #86efac; }
  .j-num   { color: #fca5a5; }
  .j-bool  { color: var(--amber); }
  .j-null  { color: var(--muted); }

  /* Empty state */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60%; color: var(--muted); gap: 8px; }
  .empty-ico { font-size: 36px; opacity: .3; }
  .empty-txt { font-size: 13px; }

  /* Loader */
  .loader { display: none; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  select.param-input { appearance: none; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Workspace API Tester</div>
    <div class="header-sub">Тестирование эндпоинтов воркспейса</div>
  </div>
  <span class="status-pill" id="auth-pill">Проверка авторизации...</span>
</div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-group">Инициализация</div>
    <button class="endpoint-btn active" onclick="setEndpoint('bootstrap')" id="btn-bootstrap">
      <span class="ep-method get">GET</span>
      <span class="ep-name">bootstrap</span>
    </button>

    <div class="sb-group">Данные</div>
    <button class="endpoint-btn" onclick="setEndpoint('process_items')" id="btn-process_items">
      <span class="ep-method get">GET</span>
      <span class="ep-name">process_items</span>
    </button>
    <button class="endpoint-btn" onclick="setEndpoint('deal_detail')" id="btn-deal_detail">
      <span class="ep-method get">GET</span>
      <span class="ep-name">deal_detail</span>
    </button>
    <button class="endpoint-btn" onclick="setEndpoint('analytics')" id="btn-analytics">
      <span class="ep-method get">GET</span>
      <span class="ep-name">analytics</span>
    </button>

    <div class="sb-group" style="margin-top:16px">Результат последнего вызова</div>
    <div style="padding:8px 14px">
      <div style="font-size:11px;color:var(--muted)" id="last-result-summary">Ещё не запускали</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Params -->
    <div class="params-bar" id="params-bar">
      <div class="param-group" id="p-process_key" style="display:none">
        <div class="param-label">process_key</div>
        <input class="param-input" id="i-process_key" value="deal_tkp" placeholder="deal_tkp">
      </div>
      <div class="param-group" id="p-entity_id" style="display:none">
        <div class="param-label">entity_id</div>
        <input class="param-input" id="i-entity_id" value="" placeholder="ID сделки">
      </div>
      <div class="param-group" id="p-filter" style="display:none">
        <div class="param-label">filter</div>
        <select class="param-input" id="i-filter">
          <option value="all">all</option>
          <option value="overdue">overdue</option>
          <option value="action">action</option>
          <option value="wait">wait</option>
        </select>
      </div>
      <div class="param-group" id="p-period" style="display:none">
        <div class="param-label">period</div>
        <select class="param-input" id="i-period">
          <option value="month">month (текущий месяц)</option>
          <option value="year">year (с начала года)</option>
        </select>
      </div>
      <div class="param-group">
        <div class="param-label">debug</div>
        <select class="param-input" id="i-debug" style="width:80px">
          <option value="N">N</option>
          <option value="Y">Y</option>
        </select>
      </div>
      <button class="run-btn" onclick="run()">
        <span id="run-label">Запустить</span>
        <div class="loader" id="loader"></div>
      </button>
    </div>

    <!-- Response -->
    <div class="response-area">
      <div id="empty-state" class="empty">
        <div class="empty-ico">⚡</div>
        <div class="empty-txt">Выберите эндпоинт и нажмите Запустить</div>
      </div>

      <div id="response-block" style="display:none">
        <div class="response-meta">
          <span class="status-badge" id="resp-status"></span>
          <span class="meta-time" id="resp-time"></span>
          <span class="meta-url" id="resp-url"></span>
        </div>
        <div class="json-wrap">
          <div class="json-toolbar">
            <span class="json-label" id="json-label">Response</span>
            <button class="copy-btn" onclick="copyJson()">Копировать</button>
          </div>
          <pre id="json-out"></pre>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// База API в текущем проекте (файл открыт из /local/ws/php/api/workspace/)
const BASE = '/local/ws/php/api/workspace/';
let currentEndpoint = 'bootstrap';
let lastRawJson = '';

const ENDPOINTS = {
  bootstrap: {
    url: 'bootstrap.php',
    params: [],
  },
  process_items: {
    url: 'process_items.php',
    params: ['process_key', 'filter'],
  },
  deal_detail: {
    url: 'deal_detail.php',
    params: ['entity_id', 'process_key'],
  },
  analytics: {
    url: 'analytics.php',
    params: ['process_key', 'period'],
  },
};

function setEndpoint(key) {
  currentEndpoint = key;
  document.querySelectorAll('.endpoint-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + key)?.classList.add('active');

  // Показываем нужные параметры
  ['process_key','entity_id','filter','period'].forEach(p => {
    document.getElementById('p-' + p).style.display = 'none';
  });
  ENDPOINTS[key].params.forEach(p => {
    document.getElementById('p-' + p).style.display = '';
  });
}

async function run() {
  const ep    = ENDPOINTS[currentEndpoint];
  const debug = document.getElementById('i-debug').value;

  const params = new URLSearchParams({ debug });
  ep.params.forEach(p => {
    const val = document.getElementById('i-' + p)?.value;
    if (val) params.set(p, val);
  });

  const url = BASE + ep.url + '?' + params.toString();

  // UI: loading
  document.getElementById('run-label').style.display = 'none';
  document.getElementById('loader').style.display = 'block';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('response-block').style.display = 'none';

  const t0 = performance.now();
  try {
    const res  = await fetch(url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
    const ms   = Math.round(performance.now() - t0);
    const raw  = await res.text();
    let data;
    try {
      data = JSON.parse(raw);
    } catch (parseErr) {
      throw new Error('Сервер вернул не JSON. HTTP ' + res.status + '. Начало ответа: ' + raw.slice(0, 180));
    }

    lastRawJson = JSON.stringify(data, null, 2);

    // Status
    const isOk = data.status === 'ok';
    const sb = document.getElementById('resp-status');
    sb.textContent = res.status + ' ' + (isOk ? 'OK' : 'Error');
    sb.className = 'status-badge ' + (isOk ? 'ok' : 'err');

    document.getElementById('resp-time').textContent = ms + ' ms';
    document.getElementById('resp-url').textContent = url;
    document.getElementById('json-label').textContent = 'Response · ' + lastRawJson.length + ' chars';
    document.getElementById('json-out').innerHTML = syntaxHighlight(lastRawJson);
    document.getElementById('response-block').style.display = 'block';

    // Sidebar summary
    const summary = isOk
      ? (data.data?.items?.length !== undefined ? data.data.items.length + ' items' : 'ok')
      : data.message;
    document.getElementById('last-result-summary').textContent =
      currentEndpoint + ': ' + res.status + ' · ' + ms + 'ms · ' + summary;

    // Auto-populate entity_id from first item
    if (currentEndpoint === 'process_items' && data.data?.items?.[0]) {
      const first = data.data.items[0];
      document.getElementById('i-entity_id').value = first.entity_id || '';
    }

  } catch (e) {
    document.getElementById('json-out').textContent = 'Ошибка: ' + e.message;
    document.getElementById('response-block').style.display = 'block';
    document.getElementById('resp-status').textContent = 'Network Error';
    document.getElementById('resp-status').className = 'status-badge err';
  }

  document.getElementById('run-label').style.display = '';
  document.getElementById('loader').style.display = 'none';
}

function syntaxHighlight(json) {
  return json
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m => {
      if (/^"/.test(m)) {
        if (/:$/.test(m)) return '<span class="j-key">' + m + '</span>';
        return '<span class="j-str">' + m + '</span>';
      }
      if (/true|false/.test(m)) return '<span class="j-bool">' + m + '</span>';
      if (/null/.test(m)) return '<span class="j-null">' + m + '</span>';
      return '<span class="j-num">' + m + '</span>';
    });
}

function copyJson() {
  navigator.clipboard.writeText(lastRawJson).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Скопировано!';
    setTimeout(() => btn.textContent = 'Копировать', 1500);
  });
}

// Проверка авторизации
async function checkAuth() {
  try {
    const res  = await fetch(BASE + 'bootstrap.php?debug=N', { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
    const raw  = await res.text();
    const data = JSON.parse(raw);
    const pill = document.getElementById('auth-pill');
    if (data.status === 'ok') {
      pill.textContent = '✓ ' + (data.data?.user?.name || 'Авторизован');
      pill.style.background = 'rgba(52,211,153,.12)';
      pill.style.color = '#34d399';
      pill.style.borderColor = 'rgba(52,211,153,.25)';
    } else if (res.status === 401) {
      pill.textContent = '✗ Не авторизован';
      pill.style.background = 'rgba(248,113,113,.12)';
      pill.style.color = '#f87171';
    }
  } catch(e) {
    document.getElementById('auth-pill').textContent = '? Нет соединения';
  }
}

// Инициализация
setEndpoint('bootstrap');
checkAuth();

// Горячая клавиша
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); run(); }
});
</script>
</body>
</html>
